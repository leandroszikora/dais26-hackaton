# Databricks App configuration for Medical Desert Planner
# Do NOT change the port - use default DATABRICKS_APP_PORT (8000)

command:
  - "streamlit"
  - "run"
  - "app.py"
  - "--server.port"
  - "$DATABRICKS_APP_PORT"
  - "--server.address"
  - "0.0.0.0"
  - "--server.headless"
  - "true"
  - "--server.enableXsrfProtection"
  - "false"
  - "--server.enableCORS"
  - "false"
